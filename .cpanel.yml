---
deployment:
  tasks:
    - export APPPATH=/home/$USER/kwdt
    - export DEPLOYPATH=/home/$USER/public_html

    # Deploy app files above public_html
    - /bin/mkdir -p $APPPATH
    - /bin/cp -R . $APPPATH

    # Copy public/ contents into public_html
    - /bin/cp -R $APPPATH/public/. $DEPLOYPATH/

    # Point public_html/index.php to the app above public_html
    - /bin/sed -i "s|__DIR__.'/../vendor|'$APPPATH/vendor|g" $DEPLOYPATH/index.php
    - /bin/sed -i "s|__DIR__.'/../bootstrap|'$APPPATH/bootstrap|g" $DEPLOYPATH/index.php

    # Install PHP dependencies (no dev, optimized)
    - cd $APPPATH && /usr/local/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

    # Laravel setup
    - cd $APPPATH && /usr/local/bin/php artisan storage:link --force
    - cd $APPPATH && /usr/local/bin/php artisan migrate --force
    - cd $APPPATH && /usr/local/bin/php artisan optimize:clear
    - cd $APPPATH && /usr/local/bin/php artisan config:cache
    - cd $APPPATH && /usr/local/bin/php artisan route:cache
    - cd $APPPATH && /usr/local/bin/php artisan view:cache
