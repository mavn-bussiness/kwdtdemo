---
deployment:
  tasks:
    - export DEPLOYPATH=/home/katoatze/public_html
    - /bin/cp -R . $DEPLOYPATH
    - cd $DEPLOYPATH
    - /usr/local/bin/composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
    - /usr/local/bin/php artisan storage:link --force
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan db:seed --force
    - /usr/local/bin/php artisan optimize:clear
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache
